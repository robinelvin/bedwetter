mqtt:
  broker: mqtt
  port: 1883
  username: mqttuser
  password: mqttpass

homeassistant:
  url: http://homeassistant.local:8123/
  token: ""

zones:
  # Example zones - edit to suit
  - name: Raised Bed 1
    # Direct MQTT topics (no HA entity)
    moisture_sensor_topic: esp01/sensor/soil_moisture/state
    valve_command_topic: esp01/switch/solenoid_valve/command
    valve_state_topic: esp01/switch/solenoid_valve/state
    threshold_low: 40
    threshold_high: 60
    max_watering_seconds: 300
    max_activations_per_day: 5
    cooldown_minutes: 90
    earliest_watering_time: "06:00"    # default
    latest_watering_time: "10:00"     # default
    # How long (seconds) the device waits for a heartbeat before turning
    # off the valve. Default 0 = 3× heartbeat_interval (e.g. 90s).
    heartbeat_timeout: 0
    seasonal_multipliers:
      1: 0.5    # January
      7: 1.5    # July

  - name: Herb Garden
    # Home Assistant entity IDs (reads via HA REST API, controls via HA services)
    moisture_sensor_entity: sensor.garden_sensor_soil_moisture
    valve_switch_entity: switch.garden_sensor_water_valve
    threshold_low: 35
    threshold_high: 55
    max_watering_seconds: 240
    max_activations_per_day: 4
    cooldown_minutes: 120
    earliest_watering_time: "07:00"
    latest_watering_time: "09:00"
    heartbeat_timeout: 0

alerts:
  email: you@example.com
  stale_sensor_minutes: 60
  smtp_server: smtp.gmail.com
  smtp_port: 587
  smtp_username: you@gmail.com
  smtp_password: app_password
  from_email: bedwetter@example.com

ntfy:
  enabled: false
  server: https://ntfy.sh
  uuid: ""                # auto-generated on first run
  token: ""               # optional, for private ntfy servers
  alert_info: true        # valve opened/closed
  alert_warn: true        # stale sensor, max watering (coming soon)
  alert_alarm: true       # failsafe activated (coming soon)

schedules:
  - zone_name: Raised Bed 1
    schedule:
      - day_of_week: Mon
        time: "06:00"
        duration: 300
      - day_of_week: Wed
        time: "06:00"
        duration: 300
      - day_of_week: Fri
        time: "06:00"
        duration: 300
    month_overrides:
      - month: 7
        schedule:
          - day_of_week: Mon
            time: "06:00"
            duration: 360
          - day_of_week: Wed
            time: "06:00"
            duration: 360
          - day_of_week: Fri
            time: "06:00"
            duration: 360
          - day_of_week: Sun
            time: "06:00"
            duration: 360

weather:
  # Open-Meteo forecast (free, no API key required)
  lat: 51.5
  lon: -0.12
  rain_threshold_mm: 5.0       # skip watering if ≥5mm rain expected in 24h
  rain_sensor_topic: ""        # optional MQTT topic for digital rain sensor
  rain_sensor_entity: ""       # or HA entity ID (binary_sensor.rain, sensor.rain, etc.)

master_valve:
  command_topic: ""            # MQTT topic for master shutoff valve (e.g. home/irrigation/master/set)
  switch_entity: ""            # or Home Assistant entity ID (e.g. switch.valve_master)
                               # Opened during automated watering, closed on safety shutoff.

web:
  listen_addr: ":8080"

db_path: bedwetter.db

# Heartbeat interval in seconds. BedWetter publishes a heartbeat to each
# active zone's MQTT topic while a valve is open. Remote devices should
# turn off locally if they stop receiving heartbeats.
# Set to 0 to disable heartbeats.
heartbeat_interval: 30
