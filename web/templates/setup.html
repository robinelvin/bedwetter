{{define "title"}}First-Time Setup{{end}}
{{define "heading"}}Welcome to BedWetter{{end}}
{{define "content"}}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center">
                <svg class="w-6 h-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
            </div>
            <h2 class="text-xl font-semibold text-slate-800">First-Time Setup</h2>
        </div>
        <p class="text-sm text-slate-500 mb-6">Create your admin user account to get started.</p>

        {{if .error}}
        <div class="mb-5 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{.error}}</div>
        {{end}}

        <form action="/setup" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">Username</label>
                <input type="text" name="username" required autocomplete="username"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">Password</label>
                <input type="password" name="password" required minlength="6" autocomplete="new-password"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">Confirm Password</label>
                <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow">
            </div>
            <button type="submit"
                class="w-full inline-flex items-center justify-center gap-1.5 px-5 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 active:bg-emerald-800 text-sm font-medium transition-colors shadow-sm">
                Create Account
            </button>
        </form>

        <div class="mt-6 pt-5 border-t border-slate-200 text-center">
            <p class="text-xs text-slate-400">
                Already have an account?
                <a href="/login" class="text-emerald-600 hover:text-emerald-700 font-medium">Sign in</a>
            </p>
        </div>
    </div>
</div>
{{end}}
