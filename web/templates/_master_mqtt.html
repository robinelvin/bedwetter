{{define "_master_mqtt"}}
<label class="block text-sm font-medium text-foreground-secondary mb-1.5">Master Valve MQTT Command Topic</label>
<input type="text" name="command_topic" value="{{.masterValve.CommandTopic}}" class="w-full rounded-lg border border-input px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow" placeholder="home/irrigation/master/set">
<p class="text-xs text-foreground-muted mt-1.5">MQTT topic to open/close the master shutoff valve. Payload "ON" to open, "OFF" to close.</p>
{{end}}
