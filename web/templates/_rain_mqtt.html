{{define "_rain_mqtt"}}
<label class="block text-sm font-medium text-slate-600 mb-1.5">Rain Sensor MQTT Topic</label>
<input type="text" name="rain_sensor_topic" value="{{.weather.RainSensorTopic}}" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-shadow">
<p class="text-xs text-slate-400 mt-1.5">Payload "1", "ON", or "true" = rain detected; all watering overridden</p>
{{end}}
