{{define "_rain_mqtt"}}
<label class="block text-sm font-medium text-foreground-secondary mb-1.5">Rain Sensor MQTT Topic</label>
<input type="text" name="rain_sensor_topic" value="{{.weather.RainSensorTopic}}" class="w-full rounded-lg border border-input px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
<p class="text-xs text-foreground-muted mt-1.5">Payload "1", "ON", or "true" = rain detected; all watering overridden</p>
{{end}}
