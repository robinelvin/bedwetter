{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BedWetter - {{block "title" .}}{{.title}}{{end}}</title>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/tailwind.css">
</head>
<body class="bg-slate-50 min-h-screen antialiased">

    <nav class="bg-gradient-to-r from-emerald-800 to-emerald-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2 text-xl font-bold tracking-tight">
                    <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                    BedWetter
                </a>
                <div class="flex items-center gap-1">
                    <a href="/dashboard" class="px-3 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-white/10 {{if eq .page "dashboard"}}bg-white/15{{end}}">Dashboard</a>
                    <a href="/schedules" class="px-3 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-white/10 {{if eq .page "schedules"}}bg-white/15{{end}}">Schedules</a>
                    <a href="/events" class="px-3 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-white/10 {{if eq .page "events"}}bg-white/15{{end}}">Events</a>
                    <a href="/config" class="px-3 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-white/10 {{if eq .page "config"}}bg-white/15{{end}}">Config</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-8 tracking-tight">{{block "heading" .}}{{.title}}{{end}}</h1>
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
{{end}}
