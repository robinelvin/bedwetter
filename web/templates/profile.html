{{define "title"}}Profile{{end}}
{{define "heading"}}Profile{{end}}
{{define "content"}}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <div class="bg-card rounded-xl shadow-sm border border-border p-6">
        <div class="flex items-center gap-3 mb-5">
            <div class="w-9 h-9 rounded-lg bg-secondary flex items-center justify-center">
                <svg class="w-5 h-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <h2 class="text-lg font-semibold text-card-foreground">Personal Info</h2>
        </div>

        {{if .error}}
        <div class="mb-5 p-3 bg-error/10 border border-error/20 text-error rounded-lg text-sm">{{.error}}</div>
        {{end}}

        {{if .info}}
        <div class="mb-5 p-3 bg-success/10 border border-success/20 text-success rounded-lg text-sm">{{.info}}</div>
        {{end}}

        <form action="/profile" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-foreground-secondary mb-1.5">Username</label>
                <input type="text" value="{{.username}}" disabled
                    class="w-full rounded-lg border border-input px-3 py-2.5 text-sm bg-base-200 text-foreground-muted cursor-not-allowed">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground-secondary mb-1.5">First Name</label>
                    <input type="text" name="first_name" value="{{.firstName}}"
                        class="w-full rounded-lg border border-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground-secondary mb-1.5">Last Name</label>
                    <input type="text" name="last_name" value="{{.lastName}}"
                        class="w-full rounded-lg border border-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-foreground-secondary mb-1.5">Email</label>
                <input type="email" name="email" value="{{.email}}"
                    class="w-full rounded-lg border border-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
            </div>
            <button type="submit"
                class="inline-flex items-center gap-1.5 px-5 py-2.5 bg-primary text-primary-foreground rounded-lg hover:bg-emerald-700 active:bg-emerald-800 text-sm font-medium transition-colors shadow-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                Save
            </button>
        </form>
    </div>

    <div class="bg-card rounded-xl shadow-sm border border-border p-6">
        <div class="flex items-center gap-3 mb-5">
            <div class="w-9 h-9 rounded-lg bg-secondary flex items-center justify-center">
                <svg class="w-5 h-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <h2 class="text-lg font-semibold text-card-foreground">Change Password</h2>
        </div>
        {{template "change_password" .}}
    </div>

</div>
{{end}}
