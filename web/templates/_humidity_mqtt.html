{{define "_humidity_mqtt"}}

    <label class="block text-sm font-medium text-foreground-secondary mb-1.5 flex items-center gap-2">
        Humidity Sensor Topic
        <span class="text-xs font-normal px-1.5 py-0.5 rounded bg-sky-100 text-sky-700">MQTT</span>
    </label>
    <input type="text" name="humidity_sensor_topic" value="{{if .editZone}}{{.editZone.HumiditySensorTopic}}{{end}}"
        class="w-full rounded-lg border border-input px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
</div>
{{end}}
