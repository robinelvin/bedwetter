{{define "change_password"}}
{{if .passwordError}}
<div class="mb-4 p-3 bg-error/10 border border-error/20 text-error rounded-lg text-sm">{{.passwordError}}</div>
{{end}}
{{if .passwordSuccess}}
<div class="mb-4 p-3 bg-success/10 border border-success/20 text-success rounded-lg text-sm">{{.passwordSuccess}}</div>
{{end}}
<form action="/profile/password" method="POST" class="space-y-4">
    <div>
        <label class="block text-sm font-medium text-foreground-secondary mb-1.5">Current Password</label>
        <input type="password" name="current_password" required autocomplete="current-password"
            class="w-full rounded-lg border border-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
    </div>
    <div>
        <label class="block text-sm font-medium text-foreground-secondary mb-1.5">New Password</label>
        <input type="password" name="new_password" required minlength="6" autocomplete="new-password"
            class="w-full rounded-lg border border-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
    </div>
    <div>
        <label class="block text-sm font-medium text-foreground-secondary mb-1.5">Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password"
            class="w-full rounded-lg border border-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring transition-shadow">
    </div>
    <button type="submit"
        class="inline-flex items-center gap-1.5 px-5 py-2.5 bg-primary text-primary-foreground rounded-lg hover:bg-emerald-700 active:bg-emerald-800 text-sm font-medium transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Change Password
    </button>
</form>
{{end}}
