{{define "_zone_cards"}}{{if .zones}}
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="zone-cards"
     hx-get="/dashboard/zones" hx-trigger="every 5s" hx-swap="outerHTML">
    {{range .zones}}
    {{- $zone := . -}}
    {{$watering := eq .State 1}}
    {{$manual := eq .State 3}}
    {{$failsafe := eq .State 4}}
    {{$cooldown := eq .State 2}}
    {{$active := or $watering $manual}}
    <div class="group bg-card rounded-xl shadow-sm border border-border p-5 transition-all duration-200 hover:shadow-md hover:border-foreground-muted/30 {{if $failsafe}}ring-2 ring-error/20{{else if $active}}ring-2 ring-primary/20{{end}}">
        {{template "_zone_card" .}}
    </div>
    {{end}}
{{end}}

</div>
{{end}}
